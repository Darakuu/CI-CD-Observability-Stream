services:
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: tap-kafka
    ports:
      - "29092:29092"
    environment:
      # Single-node KRaft setup, enough for a local observability demo.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tap-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: tap-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      # Logstash reads the collector output from this shared JSONL folder.
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./otel-output:/otel-output:rw

  logstash:
    image: docker.elastic.co/logstash/logstash:8.19.0
    container_name: tap-logstash
    depends_on:
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      # Shared with the collector; Logstash tails these files and forwards to Kafka.
      - ./otel-output:/otel-output:rw
      - ./logstash-data:/usr/share/logstash/data:rw
    environment:
      # Start and execute with 512 MBs of RAM.
      - LS_JAVA_OPTS=-Xms512m -Xmx512m

  jenkins:
    build:
      context: ./jenkins
    container_name: tap-jenkins
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      # Defaults are intentionally simple for the local demo.
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yaml
      - JENKINS_ADMIN_ID=${JENKINS_ADMIN_ID:-admin}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-admin}
    volumes:
      - ./jenkins/casc:/var/jenkins_home/casc_configs:ro
      - ./jenkins/jobs:/var/jenkins_home/job-dsl:ro
      - ./jenkins_home:/var/jenkins_home
