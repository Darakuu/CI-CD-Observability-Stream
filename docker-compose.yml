services:
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: tap-kafka
    ports:
      - "29092:29092"
    environment:
      # Single-node KRaft setup, enough for a local observability demo.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/tmp/kafka-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tap-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: tap-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        # Create pipeline topics before producers and consumers attach to them.
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cicd.otel.raw --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cicd.otel.processed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cicd.otel.scored --partitions 1 --replication-factor 1

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: tap-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      # Logstash reads the collector output from this shared JSONL folder.
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./otel-output:/otel-output:rw

  logstash:
    image: docker.elastic.co/logstash/logstash:8.19.0
    container_name: tap-logstash
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    ports:
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      # Shared with the collector; Logstash tails these files and forwards to Kafka.
      - ./otel-output:/otel-output:rw
      - ./jenkins_home:/jenkins-home:ro
      - ./logstash-data:/usr/share/logstash/data:rw
    environment:
      # Start and execute with 512 MBs of RAM.
      - LS_JAVA_OPTS=-Xms512m -Xmx512m

  spark-processor:
    build:
      context: ./spark
    container_name: tap-spark-processor
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      logstash:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - RAW_TOPIC=cicd.otel.raw
      - PROCESSED_TOPIC=cicd.otel.processed
      - CHECKPOINT_LOCATION=/tmp/spark-checkpoints/cicd-otel-processed
    volumes:
      # Spark needs POSIX filesystem semantics for checkpoint metadata.
      # A Docker volume avoids chmod failures on Windows bind mounts.
      - spark-checkpoints:/tmp/spark-checkpoints:rw
    command:
      - /opt/spark/bin/spark-submit
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - /opt/tap/spark/process_stream.py

  spark-mllib:
    build:
      context: ./spark
    container_name: tap-spark-mllib
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      spark-processor:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ML_INPUT_TOPIC=cicd.otel.processed
      - ML_OUTPUT_TOPIC=cicd.otel.scored
      - ML_CHECKPOINT_LOCATION=/tmp/spark-checkpoints/cicd-otel-scored
    volumes:
      - spark-checkpoints:/tmp/spark-checkpoints:rw
    command:
      - /opt/spark/bin/spark-submit
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - /opt/tap/spark/score_stream.py

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: tap-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - cluster.name=tap-observability
      - node.name=tap-es01
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-admine}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:$${ELASTIC_PASSWORD} 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  elasticsearch-indexer:
    build:
      context: ./elastic_indexer
    container_name: tap-elasticsearch-indexer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      spark-mllib:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_INPUT_TOPIC=cicd.otel.scored
      - ELASTICSEARCH_KAFKA_GROUP_ID=elasticsearch-indexer
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-admine}
      - ELASTICSEARCH_INDEX=cicd-observability-events
      - ELASTICSEARCH_BATCH_SIZE=200
      - ELASTICSEARCH_FLUSH_INTERVAL_SECONDS=5

  jenkins:
    build:
      context: ./jenkins
    container_name: tap-jenkins
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      # Defaults are intentionally simple for the local demo.
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yaml
      - JENKINS_ADMIN_ID=${JENKINS_ADMIN_ID:-admin}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-admin}
    volumes:
      - ./jenkins/casc:/var/jenkins_home/casc_configs:ro
      - ./jenkins/jobs:/var/jenkins_home/job-dsl:ro
      - ./jenkins_home:/var/jenkins_home

volumes:
  kafka-data:
  elasticsearch-data:
  kibana-data:
  spark-checkpoints:
