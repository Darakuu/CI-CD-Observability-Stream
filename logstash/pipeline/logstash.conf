input {
  file {
    id => "otel_jsonl_file_input"
    # The collector writes JSONL files into the shared volume mounted here.
    path => "/otel-output/*.jsonl"
    mode => "tail"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_otel_jsonl"
    codec => json
  }

  file {
    id => "jenkins_build_log_input"
    path => "/jenkins-home/jobs/*/builds/*/log"
    mode => "tail"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_jenkins_build_logs"
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  if [path] =~ "/jenkins-home/jobs/" {
    if [message] !~ /event=/ or [message] =~ /\+ echo event=/ {
      drop { }
    }

    mutate {
      add_field => {
        "ingestion.component" => "logstash"
        "event.dataset" => "jenkins.build.console"
        "otel.signal" => "logs"
        "ci.source" => "jenkins-build-log"
      }
    }
  } else {
    mutate {
      # Add a small amount of context before the event enters Kafka.
      add_field => {
        "ingestion.component" => "logstash"
        "event.dataset" => "jenkins.otel.raw"
      }
    }

    # OpenTelemetry uses different top-level fields for each signal family.
    if [resourceSpans] {
      mutate { add_field => { "otel.signal" => "traces" } }
    } else if [resourceMetrics] {
      mutate { add_field => { "otel.signal" => "metrics" } }
    } else if [resourceLogs] {
      mutate { add_field => { "otel.signal" => "logs" } }
    } else {
      mutate { add_field => { "otel.signal" => "unknown" } }
    }
  }
}

output {
  kafka {
    # Kafka is the hand-off point for later stream processing steps.
    bootstrap_servers => "kafka:9092"
    topic_id => "cicd.otel.raw"
    codec => json
  }

  stdout {
    codec => rubydebug { metadata => false }
  }
}
